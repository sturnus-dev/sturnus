name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    uses: ./.github/workflows/tests.yml
    with:
      build: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker build .
