name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    uses: ./.github/workflows/tests.yml
    with:
      build: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: docker build .
